services:
  - type: web
    name: dsa-a2z-team-tracker
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24.0.0
      - key: PORT
        value: 5000
    # Note: On Render's 100% Free Tier, files stored on disk reset when the instance restarts after inactivity.
    # To enable permanent disk storage so SQLite data persists across restarts, upgrade to Render's Starter Plan ($7/mo)
    # and uncomment the disk section below:
    # disk:
    #   name: tracker-db-data
    #   mountPath: /opt/render/project/src/backend/data
    #   sizeGB: 1
